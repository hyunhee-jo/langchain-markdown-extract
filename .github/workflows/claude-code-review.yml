name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          review_comment: |
            Review this PR for:
            - Code quality and bugs
            - SYNCED marker integrity
            - Parameter sync correctness
            - Test coverage gaps
          allowed_tools: |
            gh pr comment
            gh pr view
            gh pr diff
